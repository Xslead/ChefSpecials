name: chef_specials
description: "A food tracker and recipe sharing app with step-by-step cooking guidance."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  provider: ^6.1.2
  go_router: ^14.8.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  uuid: ^4.5.1
  fl_chart: ^1.1.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.4
  http: ^1.2.0
  share_plus: ^10.1.4
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  lottie: ^3.3.2
  flutter_image_compress: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^3.1.0
  mockito: ^5.4.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#29ABE2"
  adaptive_icon_foreground: "assets/logo.png"
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo.png
    - assets/animations/
